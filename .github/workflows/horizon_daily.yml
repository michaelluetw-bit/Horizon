name: Horizon Daily Aggregation

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00（台灣時間 08:00）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: horizon-daily
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Prepare canonical cloud config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PYTHONIOENCODING: 'utf-8'
        run: |
          uv run horizon --hours 24

      - name: Commit and push changes
        run: |
          git add -f data/summaries docs/_posts
          if git diff --cached --quiet; then
            echo "No summary changes to commit."
          else
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "docs: 雲端自動生成每日快報 [skip ci]"
            git push origin main
          fi
