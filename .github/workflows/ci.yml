name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: windows-latest
    # Phase 1: report lint findings without blocking merges.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --locked --extra dev
      - run: uv run ruff check .

  test:
    name: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --locked --extra dev
      - run: uv run pytest -q

  watchdog:
    name: watchdog
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install watchdog test dependencies
        working-directory: workers/horizon-watchdog
        run: npm ci
      - name: Run watchdog contracts
        working-directory: workers/horizon-watchdog
        run: npm test
